<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PTOX11">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<title>PTOX11 — Search</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--red:#c0392b;--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#2a2a2a;--text:#e8e4df;--muted:#7a7570;--green:#4ade80;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.topbar{height:52px;background:#141414;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);letter-spacing:2px;margin-right:16px;white-space:nowrap;flex-shrink:0;text-decoration:none;}
.logo span{color:var(--red);}
.pill-group{display:flex;gap:4px;flex:1;justify-content:center;}
.pill{padding:6px 0;min-width:78px;border-radius:14px;font-size:13px;font-weight:600;color:#666;background:transparent;border:1px solid transparent;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px;text-decoration:none;cursor:pointer;transition:all 0.15s;}
.pill.active{color:var(--text);background:#222;border-color:#444;}
.pill .pill-count{font-size:10px;font-weight:500;color:#555;}
.pill.active .pill-count{color:#999;}
.more-btn{padding:7px 11px;border-radius:14px;font-size:11px;font-weight:500;color:#666;background:transparent;border:1px solid #333;display:flex;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;}
.more-btn:hover{border-color:#555;color:#aaa;}
.dropdown-overlay{display:none;}
.dropdown-overlay.show{display:block;}
.dropdown{position:fixed;right:14px;top:54px;background:#222;border:1px solid #333;border-radius:12px;padding:6px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:200;}
.dd-item{padding:10px 14px;font-size:14px;color:#ccc;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;text-decoration:none;}
.dd-item:hover{background:#2a2a2a;}
.dd-icon{font-size:15px;width:20px;text-align:center;}
.dd-divider{height:1px;background:#333;margin:4px 10px;}
.dd-backdrop{position:fixed;inset:0;z-index:199;}
h1{font-size:18px;font-weight:700;color:#fff;flex:1}
.search-panel{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px}
input,select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--red)}
input::placeholder{color:var(--muted)}
.btn-row{display:flex;gap:8px;align-items:center}
button{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-search{background:var(--red);color:#fff}
.btn-search:hover{opacity:0.9}
.btn-clear{background:var(--bg3);color:var(--muted)}
.btn-clear:hover{color:var(--text)}
.result-count{color:var(--muted);font-size:13px;margin-left:auto}
.results{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--red)}
.card-img{width:100%;height:160px;object-fit:cover;background:var(--bg3)}
.card-img-placeholder{width:100%;height:160px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--border);font-size:28px}
.card-body{padding:12px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.card-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.price{font-size:15px;font-weight:700;color:var(--green)}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase}
.badge-active{background:#052210;color:var(--green)}
.badge-sold{background:#1a0508;color:#f87171}
.source-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.vin{font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace;word-break:break-all}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results .icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>
<header class="topbar">
  <a class="logo" href="index.html">PTO<span>X</span></a>
  <div class="pill-group">
    <a class="pill" href="index.html">
      <span class="pill-label">Listings</span>
    </a>
    <a class="pill" href="auctions.html">
      <span class="pill-label">Auctions</span>
    </a>
    <a class="pill" href="index.html#comps">
      <span class="pill-label">Comps</span>
    </a>
  </div>
  <button class="more-btn" onclick="toggleDropdown()">More &#x25BE;</button>
  <span id="db-count" style="font-size:11px;color:var(--muted);flex-shrink:0"></span>
</header>
<div class="dropdown-overlay" id="dd-overlay">
  <div class="dd-backdrop" onclick="closeDropdown()"></div>
  <div class="dropdown">
    <div class="dd-item"><span class="dd-icon">&#x2605;</span> My Cars</div>
    <a class="dd-item" href="search.html"><span class="dd-icon">&#x1F50D;</span> Search</a>
    <div class="dd-divider"></div>
    <a class="dd-item" href="market_report.html"><span class="dd-icon">&#x1F4CA;</span> Market Reports</a>
    <a class="dd-item" href="notify.html"><span class="dd-icon">&#x1F514;</span> Notifications</a>
    <div class="dd-divider"></div>
    <div class="dd-item"><span class="dd-icon">&#x2699;&#xFE0F;</span> Settings</div>
  </div>
</div>

<div class="search-panel">
  <div class="filters">
    <input id="q-vin" placeholder="VIN (full or partial)" />
    <input id="q-year-min" placeholder="Year from" type="number" min="1965" max="2026" />
    <input id="q-year-max" placeholder="Year to" type="number" min="1965" max="2026" />
    <input id="q-model" placeholder="Model (911, Cayman, Boxster...)" />
    <input id="q-trim" placeholder="Trim (GT3, Carrera S...)" />
    <input id="q-price-max" placeholder="Max price $" type="number" />
    <input id="q-miles-max" placeholder="Max mileage" type="number" />
    <select id="q-source">
      <option value="">All sources</option>
      <option>Bring a Trailer</option>
      <option>Cars and Bids</option>
      <option>eBay Motors</option>
      <option>PCA Mart</option>
      <option>pcarmarket</option>
      <option>AutoTrader</option>
      <option>cars.com</option>
      <option>Rennlist</option>
      <option>Built for Backroads</option>
      <option>DuPont Registry</option>
    </select>
    <select id="q-status">
      <option value="">All status</option>
      <option value="active">Active</option>
      <option value="sold">Sold</option>
    </select>
  </div>
  <div class="btn-row">
    <button class="btn-search" onclick="doSearch()">Search</button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<div id="results" class="results">
  <div class="loading">Enter search terms above and hit Search</div>
</div>

<script>
const DATA_URL = 'search_data.json';
let allListings = [];

async function loadData() {
  try {
    const r = await fetch(DATA_URL);
    allListings = await r.json();
    document.getElementById('db-count').textContent = allListings.length.toLocaleString() + ' listings in database';
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="no-results"><div class="icon">⚠️</div>Could not load listing data</div>';
  }
}

function val(id) { return document.getElementById(id).value.trim().toLowerCase(); }

function doSearch() {
  const vin = val('q-vin');
  const yearMin = parseInt(document.getElementById('q-year-min').value) || 0;
  const yearMax = parseInt(document.getElementById('q-year-max').value) || 9999;
  const model = val('q-model');
  const trim = val('q-trim');
  const priceMax = parseInt(document.getElementById('q-price-max').value) || 99999999;
  const milesMax = parseInt(document.getElementById('q-miles-max').value) || 99999999;
  const source = val('q-source');
  const status = val('q-status');

  if (!vin && !model && !trim && !source && !status && yearMin === 0 && yearMax === 9999 && priceMax === 99999999 && milesMax === 99999999) {
    document.getElementById('results').innerHTML = '<div class="no-results"><div class="icon">🔍</div>Enter at least one search term</div>';
    return;
  }

  let results = allListings.filter(l => {
    if (vin && !(l.vin || '').toLowerCase().includes(vin)) return false;
    if (l.year < yearMin || l.year > yearMax) return false;
    if (model && !(l.model || '').toLowerCase().includes(model)) return false;
    if (trim && !(l.trim || '').toLowerCase().includes(trim)) return false;
    if (l.price && l.price > priceMax) return false;
    if (l.mileage && l.mileage > milesMax) return false;
    if (source && (l.dealer || '').toLowerCase() !== source) return false;
    if (status && l.status !== status) return false;
    return true;
  });

  results.sort((a,b) => (b.created_at || '').localeCompare(a.created_at || ''));

  document.getElementById('result-count').textContent = results.length.toLocaleString() + ' results';

  if (!results.length) {
    document.getElementById('results').innerHTML = '<div class="no-results"><div class="icon">🔍</div>No listings found matching your search</div>';
    return;
  }

  document.getElementById('results').innerHTML = results.slice(0, 200).map(l => {
    const img = l.image_url && l.image_url.startsWith('http')
      ? `<img class="card-img" src="${l.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="card-img-placeholder" style="${img ? 'display:none' : ''}">🏎</div>`;
    const price = l.price ? '$' + l.price.toLocaleString() : 'No price';
    const miles = l.mileage ? l.mileage.toLocaleString() + ' mi' : '—';
    const statusBadge = l.status === 'active'
      ? '<span class="badge badge-active">Active</span>'
      : '<span class="badge badge-sold">Sold</span>';
    const seen = l.date_first_seen ? l.date_first_seen.split('T')[0] : '';
    return `<div class="card" onclick="openListing('${l.listing_url}')">
      ${img}${placeholder}
      <div class="card-body">
        <div class="card-title">${l.year} Porsche ${l.model}${l.trim ? ' ' + l.trim : ''}</div>
        <div class="card-meta">${miles} &nbsp;·&nbsp; ${seen}</div>
        <div class="card-row">
          <span class="price">${price}</span>
          ${statusBadge}
        </div>
        <div class="card-row" style="margin-top:6px">
          <span class="source-badge">${l.dealer}</span>
        </div>
        ${l.vin ? `<div class="vin">${l.vin}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function clearAll() {
  ['q-vin','q-year-min','q-year-max','q-model','q-trim','q-price-max','q-miles-max'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('q-source').value = '';
  document.getElementById('q-status').value = '';
  document.getElementById('result-count').textContent = '';
  document.getElementById('results').innerHTML = '<div class="loading">Enter search terms above and hit Search</div>';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
loadData();

function openListing(url) {
  window.open(url, '_blank');
}

window.addEventListener('pageshow', function(e) {
  if (e.persisted) { /* page restored from bfcache — no action needed */ }
});

function toggleDropdown() {
  document.getElementById('dd-overlay').classList.toggle('show');
}
function closeDropdown() {
  document.getElementById('dd-overlay').classList.remove('show');
}
</script>
</body>
</html>
