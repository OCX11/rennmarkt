<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unlock</title>
<style>
  body { background:#111; color:#fff; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; flex-direction:column; gap:16px; }
  input { background:#222; border:1px solid #444; color:#fff; font-family:monospace; font-size:18px; padding:10px 16px; border-radius:6px; outline:none; text-align:center; width:200px; }
  button { background:#e63; border:none; color:#fff; font-family:monospace; font-size:14px; padding:10px 24px; border-radius:6px; cursor:pointer; }
  .msg { font-size:12px; color:#f55; display:none; }
</style>
</head>
<body>
<div style="font-size:13px;color:#888;">FMV Access</div>
<input type="password" id="pw" placeholder="passphrase" autofocus onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">Unlock</button>
<div class="msg" id="msg">incorrect</div>
<script>
function go() {
  var pw = document.getElementById('pw').value.trim();
  if (pw === 'gt3rs') {
    localStorage.setItem('ptox_unlock', 'gt3rs');
    window.location.href = '/dashboard.html';
  } else {
    var m = document.getElementById('msg');
    m.style.display = 'block';
    document.getElementById('pw').value = '';
  }
}
</script>
</body>
</html>
